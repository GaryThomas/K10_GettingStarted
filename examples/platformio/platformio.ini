; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter, extra scripting
;   Upload options: custom port, speed and extra flags
;   Library options: dependencies, extra library storages
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:unihiker]
platform = https://github.com/DFRobot/platform-unihiker.git
board = unihiker_k10
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
; Change -DNO_example to -Dexample to choose which example to build
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DModel=None
    -DNO_DISPLAY_BACKGROUND_COLOR
    -DNO_DISPLAY_PHOTO_ALBUM
    -DNO_DISPLAY_SHOWING_TEXT
    -DNO_DISPLAY_DRAW_POINT
    -DNO_DISPLAY_DRAW_LINE
    -DDISPLAY_METEOR_SHOWER
    -DNO_DISPLAY_DRAW_RECTANGLE
    -DNO_DISPLAY_DRAW_CIRCLE
    -DNO_DISPLAY_DRAW_TRIANGLE
    -DNO_DISPLAY_DRAW_BITMAP
    -DNO_DISPLAY_SHOWING_FPS
    -DNO_DISPLAY_SHOWING_TIME
    -DNO_DISPLAY_SHOWING_DATE
    -DNO_DISPLAY_SHOWING_BATTERY
    -DNO_DISPLAY_SHOWING_WIFI
    -DNO_DISPLAY_SHOWING_BLE
    -DNO_DISPLAY_SHOWING_SD_CARD
    -DNO_DISPLAY_SHOWING_SPEAKER
    -DNO_DISPLAY_SHOWING_MICROPHONE
    -DNO_DISPLAY_SHOWING_ACCELEROMETER
    -DNO_DISPLAY_SHOWING_GYROSCOPE
    -DNO_DISPLAY_SHOWING_COMPASS
    -DNO_DISPLAY_SHOWING_BAROMETER
    -DNO_DISPLAY_SHOWING_HUMIDITY
    -DNO_DISPLAY_SHOWING_TEMPERATURE
    -DNO_DISPLAY_SHOWING_PROXIMITY
    -DNO_DISPLAY_SHOWING_LIGHT
    -DNO_DISPLAY_SHOWING_COLOR
    -DNO_DISPLAY_SHOWING_TOUCH
    -DNO_DISPLAY_SHOWING_GESTURE
    -DNO_DISPLAY_SHOWING_FACE
    -DNO_DISPLAY_SHOWING_QR_CODE
    -DNO_DISPLAY_SHOWING_DATA_MATRIX
    -DNO_DISPLAY_SHOWING_AZIMUTH
    -DNO_DISPLAY_SHOWING_ELEVATION
    -DNO_DISPLAY_SHOWING_HEADING
    -DNO_DISPLAY_SHOWING_SPEED
    -DNO_DISPLAY_SHOWING_ALTITUDE
